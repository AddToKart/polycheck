name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: polycheck_test
          POSTGRES_USER: polycheck
          POSTGRES_PASSWORD: polycheck-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polycheck -d polycheck_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://polycheck:polycheck-test-password@localhost:5432/polycheck_test?schema=public
      REDIS_URL: redis://localhost:6379/0
      BETTER_AUTH_SECRET: ci-only-better-auth-secret-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:4000
      CORS_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      EXPO_PUBLIC_API_URL: http://localhost:4000/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high
      - run: pnpm --filter @polycheck/backend prisma:generate
      - run: pnpm --filter @polycheck/backend prisma:migrate:deploy
      - run: pnpm --filter @polycheck/backend format:check
      - run: pnpm --filter @polycheck/backend lint:check
      - run: pnpm --dir frontend lint
      - run: pnpm --dir frontend test
      - run: pnpm --filter @polycheck/shared build
      - run: pnpm --filter @polycheck/backend build
      - run: pnpm --filter @polycheck/backend test:ci
      - run: pnpm --filter @polycheck/backend test:e2e
      - run: pnpm --dir frontend build
      - run: pnpm --dir android typecheck

  containers:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Validate production Compose topology
        env:
          POSTGRES_PASSWORD: compose-validation-only
          REDIS_PASSWORD: compose-validation-only
          DATABASE_URL: postgresql://polycheck:compose-validation-only@pgbouncer:5432/polycheck?schema=public&pgbouncer=true&connection_limit=10&pool_timeout=10
          DIRECT_DATABASE_URL: postgresql://polycheck:compose-validation-only@postgres:5432/polycheck?schema=public&connection_limit=2&pool_timeout=30
          REDIS_URL: redis://:compose-validation-only@redis:6379/0
          BETTER_AUTH_SECRET: compose-validation-only-secret-at-least-32-characters
          METRICS_TOKEN: compose-validation-only-metrics-token-at-least-32-characters
          BETTER_AUTH_URL: https://polycheck.example.test
          CORS_ORIGINS: https://polycheck.example.test
          FRONTEND_URL: https://polycheck.example.test
          NEXT_PUBLIC_API_URL: /api
          S3_BUCKET: compose-validation-only
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f deployment/docker-compose.scale.yml config --quiet
      - name: Validate nginx configuration
        run: >-
          docker run --rm
          -v "$GITHUB_WORKSPACE/deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"
          nginxinc/nginx-unprivileged:1.28-alpine nginx -t
      - name: Validate Prometheus configuration and rules
        env:
          METRICS_TOKEN: prometheus-validation-only-token-at-least-32-characters
        run: |
          mkdir -p "$RUNNER_TEMP/polycheck-prometheus-secrets"
          printf '%s' "$METRICS_TOKEN" > "$RUNNER_TEMP/polycheck-prometheus-secrets/metrics_token"
          docker run --rm --entrypoint promtool \
            -v "$GITHUB_WORKSPACE/deployment/monitoring:/etc/prometheus:ro" \
            -v "$RUNNER_TEMP/polycheck-prometheus-secrets:/run/secrets:ro" \
            prom/prometheus:v3.5.0 check config /etc/prometheus/prometheus.yml
          docker run --rm --entrypoint promtool \
            -v "$GITHUB_WORKSPACE/deployment/monitoring:/etc/prometheus:ro" \
            prom/prometheus:v3.5.0 check rules /etc/prometheus/alerts.yml
      - uses: grafana/setup-k6-action@v1
      - name: Validate k6 attendance test
        run: |
          k6 inspect performance/attendance-load.js
          k6 inspect --env K6_PROFILE=full performance/attendance-load.js
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: true
          tags: polycheck-backend:ci
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          tags: polycheck-frontend:ci
          build-args: NEXT_PUBLIC_API_URL=https://api.example.test/api
      - uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: polycheck-backend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
      - uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: polycheck-frontend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
