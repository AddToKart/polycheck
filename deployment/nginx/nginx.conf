worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format structured escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
    '"request_id":"$request_id","request":"$request",'
    '"status":$status,"bytes":$body_bytes_sent,"request_time":$request_time,'
    '"upstream":"$upstream_addr","upstream_time":"$upstream_response_time"}';
  access_log /dev/stdout structured;
  error_log /dev/stderr warn;

  sendfile on;
  tcp_nopush on;
  server_tokens off;
  client_max_body_size 8m;
  keepalive_timeout 65s;
  client_body_timeout 15s;
  client_header_timeout 15s;
  send_timeout 30s;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  resolver 127.0.0.11 valid=10s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
  }

  upstream backend_pool {
    zone backend_pool 64k;
    server backend:4000 resolve max_fails=2 fail_timeout=15s;
    keepalive 128;
  }

  upstream frontend_pool {
    zone frontend_pool 32k;
    server frontend:3000 resolve;
    keepalive 32;
  }

  server {
    listen 8080;
    server_name _;

    location = /healthz {
      access_log off;
      proxy_pass http://backend_pool/api/health/ready;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection '';
      proxy_connect_timeout 2s;
      proxy_read_timeout 5s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location ^~ /api/ {
      proxy_pass http://backend_pool;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header Connection '';
      proxy_connect_timeout 5s;
      # BullMQ waits up to 60s for authoritative per-record results.
      proxy_read_timeout 75s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # Socket.IO uses /socket.io for the transport even though the namespace is
    # /attendance. Keep both paths on the backend and preserve upgrades.
    location ^~ /socket.io/ {
      proxy_pass http://backend_pool;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_buffering off;
      proxy_connect_timeout 5s;
      proxy_read_timeout 75s;
      proxy_send_timeout 75s;
    }

    location ^~ /attendance {
      proxy_pass http://backend_pool;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_buffering off;
      proxy_read_timeout 75s;
    }

    location / {
      proxy_pass http://frontend_pool;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header Connection '';
      proxy_connect_timeout 5s;
      proxy_read_timeout 60s;
    }
  }
}
