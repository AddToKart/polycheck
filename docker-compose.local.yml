name: polycheck-local

x-backend-build: &backend-build
  context: .
  dockerfile: Dockerfile.backend

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: polycheck
      POSTGRES_USER: polycheck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - local-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polycheck -d polycheck"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - local-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: polycheck-backend-local
    build: *backend-build
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://polycheck:${POSTGRES_PASSWORD}@postgres:5432/polycheck?schema=public
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_ISSUER: ${JWT_ISSUER:-polycheck-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-polycheck-clients}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      TRUST_PROXY: "false"
      ENABLE_API_DOCS: "true"
      UPLOAD_DIR: /app/backend/uploads
      MAX_PROOF_BYTES: ${MAX_PROOF_BYTES:-5000000}
    volumes:
      - local-proof-uploads:/app/backend/uploads
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    image: polycheck-frontend-local
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  seed:
    profiles: ["tools"]
    image: polycheck-backend-local
    build: *backend-build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://polycheck:${POSTGRES_PASSWORD}@postgres:5432/polycheck?schema=public
      SEED_PASSWORD: ${SEED_PASSWORD:?SEED_PASSWORD is required}
      ALLOW_PRODUCTION_SEED: "false"
    command: ["node", "-r", "ts-node/register/transpile-only", "-e", "require('./prisma/seed.ts')"]
    restart: "no"

volumes:
  local-postgres-data:
  local-redis-data:
  local-proof-uploads:
