global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: polycheck-backend
    metrics_path: /api/metrics
    scheme: http
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    dns_sd_configs:
      - names:
          - backend
        type: A
        port: 4000
        refresh_interval: 15s
